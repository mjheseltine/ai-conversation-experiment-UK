<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ballroom Conversation</title>
<style>
  :root {
    --bg:#f6f7fb; --card:#fff; --muted:#6b7280; --accent:#1f6feb;
    --radius:12px; --shadow:0 6px 18px rgba(35,40,50,0.08);
    font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  }
  body { background:var(--bg); margin:20px; color:#111; }
  .container { max-width:820px; margin:0 auto; }
  .conversation { display:flex; flex-direction:column; gap:12px; margin-bottom:12px; }
  .post, .ai-summary {
    background:var(--card); border-radius:var(--radius); padding:12px; display:flex; gap:12px;
    align-items:flex-start; box-shadow:var(--shadow); border-bottom:1px solid #f1f5f9; position:relative;
  }
  .post:hover, .ai-summary:hover { transform:translateY(-2px); transition:transform .15s ease; }
  .ai-summary { background:#fffdf8; border:1px solid #fbe5b3; }
  .avatar {
    width:48px; height:48px; border-radius:50%; display:grid; place-items:center;
    color:#fff; font-weight:700; font-size:14px; flex:0 0 auto;
  }
  .g1{background:linear-gradient(135deg,#1f6feb,#3b82f6);}
  .g2{background:linear-gradient(135deg,#10b981,#34d399);}
  .g3{background:linear-gradient(135deg,#f59e0b,#fbbf24);}
  .g4{background:linear-gradient(135deg,#ec4899,#f472b6);}
  .g-ai { background:linear-gradient(135deg,#6366f1,#8b5cf6); }
  .content { flex:1; min-width:0; }
  .meta { display:flex; gap:8px; align-items:center; font-size:13px; color:var(--muted); }
  .name { font-weight:700; color:#0f1724; margin-right:4px; }
  .handle { color:var(--muted); }
  .text { margin-top:6px; font-size:15px; line-height:1.45; color:#0f1724; white-space:pre-wrap; }
  .post-image-wrap { width:100%; margin-top:10px; }
  .post-image {
    width:100%; max-width:100%; height:260px; display:block; border-radius:12px;
    object-fit:cover; border:1px solid #e5e7eb;
  }
  .actions { margin-top:10px; display:flex; gap:14px; color:var(--muted); font-size:13px; }
  .actions button { background:none; border:none; cursor:pointer; padding:4px 6px; border-radius:6px; }
  .actions button:hover { background:#f1f5f9; transform:scale(1.08); }
  #showMore { display:block; margin:8px auto 12px auto; padding:8px 14px; border-radius:8px; border:none; background:var(--accent); color:#fff; cursor:pointer; font-weight:500; }
  #showMore.fade-out { animation:fadeOut .25s forwards; }
  .fade-in { animation:fadeInUp .36s ease forwards; }
  @keyframes fadeInUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:none;} }
  @keyframes fadeOut { from{opacity:1;} to{opacity:0;transform:scale(.98);} }
  .reply-box { margin-top:12px; display:flex; gap:10px; align-items:flex-end; }
  textarea { flex:1; min-height:78px; padding:10px; border-radius:8px; border:1px solid #e2e8f0; font-size:14px; resize:vertical; }
  .post-btn { padding:8px 14px; border-radius:8px; border:none; background:var(--accent); color:#fff; cursor:pointer; }
  .post-btn:hover { background:#155bd8; }
  .main-post-highlight { background-color:#e8f3ff; border:1px solid #d0e7ff; }
</style>
</head>
<body>
<div class="container">
  <h2>Conversation - Please Read, React, and Respond</h2>
  <div id="conversation" class="conversation" aria-live="polite"></div>
  <button id="showMore">Show more comments</button>
  <div class="reply-box">
    <textarea id="userComment" placeholder="Write a reply..."></textarea>
    <button id="postComment" class="post-btn">Post</button>
  </div>
</div>

<script>
const initialPosts = [
  {
    id: "p1",
    name: "UKPoliticsNow",
    handle: "@ukpoliticsnow",
    avatarSeed: "UP",
    image: "post1.jpg",
    imageAlt: "Prince Harry news image",
    text: "News: Prince Harry begins week-long UK visit as verdict due in privacy case against Daily Mail publisher.",
    likes: 95,
    retweets: 21
  },
  {
    id: "p2",
    name: "PolicyWatch",
    handle: "@policywatch",
    avatarSeed: "PW",
    text: "Whatever the outcome, Harry has shown tremendous courage unlike his wimps of a father and brother.",
    likes: 34,
    retweets: 6
  },
  {
    id: "p3",
    name: "RoyalCommentary",
    handle: "@royalcommentary",
    avatarSeed: "RC",
    text: "Wishing success to Prince Harry, Doreen Lawrence, Elton John, David Furnish, Liz Hurley, & Sadie Frost, & praying  Associated Newspapers & in particular the Daily Mail finally get their comeuppance",
    likes: 40,
    retweets: 7
  },
  {
    id: "p4",
    name: "WestminsterInsider",
    handle: "@westminsterinsider",
    avatarSeed: "WI",
    text: "Harry has shown immense courage in taking on an establishment that has used illegal and unethical tactics to profit at the expense of others. Either way Harry is a winner and his mother would have been proud of him. #WeloveyouGKH",
    likes: 18,
    retweets: 3
  },
  {
    id: "p5",
    name: "Daniel",
    handle: "@daniel_thinks",
    avatarSeed: "DT",
    text: "For someone who claims the UK is too dangerous, he sure is here a lot.",
    likes: 27,
    retweets: 2
  }
];

const morePosts = [
  {
    id: "p6",
    name: "HannahK",
    handle: "@hannahk",
    avatarSeed: "HK",
    text: "The insufferable cretin needs to be removed from the Royal Fold like Andrew",
    likes: 20,
    retweets: 1
  },
  {
    id: "p7",
    name: "Oliver",
    handle: "@oliverwrites",
    avatarSeed: "OW",
    text: "It will be interesting to see whether people focus more on the legal principles or just the royal angle of the story.",
    likes: 26,
    retweets: 4
  },
  {
    id: "p8",
    name: "Sophie M",
    handle: "@sophiem",
    avatarSeed: "SM",
    text: "Best of luck to the claimants in the court case. I hope for their success. Time media in this country were held accountable for their actions.",
    likes: 22,
    retweets: 2
  },
  {
    id: "p9",
    name: "Arjun",
    handle: "@arjun_uk",
    avatarSeed: "AU",
    text: "He will probably win. But will he ever stop whinging? I don’t think so.",
    likes: 24,
    retweets: 3
  }
];

function shuffle(arr) {
  let a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function initials(seed) {
  const s = String(seed).trim().split(/\s+/);
  return s.length > 1 ? s[0][0] + s[1][0] : String(seed).slice(0, 2).toUpperCase();
}
function seedToAvatarClass(seed) {
  let s = 0;
  for (let c of String(seed)) s += c.charCodeAt(0);
  return ["g1", "g2", "g3", "g4"][s % 4];
}
let appendedMore = false;
let likeCounts = {};
let retweetCounts = {};
const convo = document.getElementById("conversation");

function renderInitial() {
  convo.innerHTML = "";
  const first = initialPosts[0];
  const remaining = shuffle(initialPosts.slice(1));
  const firstEl = createPost(first);
  firstEl.classList.add("main-post-highlight");
  convo.appendChild(firstEl);
  remaining.forEach(p => convo.appendChild(createPost(p)));
}

function createPost(p) {
  const wrap = document.createElement("article");
  wrap.className = "post fade-in";
  wrap.id = `post-${p.id}`;

  const av = document.createElement("div");
  av.className = "avatar " + seedToAvatarClass(p.avatarSeed || p.name || p.id);
  av.textContent = initials(p.avatarSeed || p.name || p.id);

  const cont = document.createElement("div");
  cont.className = "content";

  const meta = document.createElement("div");
  meta.className = "meta";
  const nm = document.createElement("span");
  nm.className = "name";
  nm.textContent = p.name;
  const hd = document.createElement("span");
  hd.className = "handle";
  hd.textContent = " " + p.handle;
  meta.append(nm, hd);

  const txt = document.createElement("div");
  txt.className = "text";
  txt.textContent = p.text;

  cont.append(meta, txt);

  if (p.image) {
    const imgWrap = document.createElement("div");
    imgWrap.className = "post-image-wrap";
    const img = document.createElement("img");
    img.className = "post-image";
    img.src = p.image;
    img.alt = p.imageAlt || `${p.name} image`;
    img.loading = "lazy";
    imgWrap.appendChild(img);
    cont.appendChild(imgWrap);
  }

  const act = document.createElement("div");
  act.className = "actions";

  const like = document.createElement("button");
  like.innerHTML = `❤️ <span class="count">${p.likes || 0}</span>`;
  like.onclick = () => {
    likeCounts[p.id] = (likeCounts[p.id] ?? p.likes ?? 0) + 1;
    like.querySelector(".count").textContent = likeCounts[p.id];
    window.parent.postMessage({ type: "USER_LIKE", postId: p.id }, "*");
  };

  const rt = document.createElement("button");
  rt.innerHTML = `🔁 <span class="count">${p.retweets || 0}</span>`;
  rt.onclick = () => {
    retweetCounts[p.id] = (retweetCounts[p.id] ?? p.retweets ?? 0) + 1;
    rt.querySelector(".count").textContent = retweetCounts[p.id];
    window.parent.postMessage({ type: "USER_RETWEET", postId: p.id }, "*");
  };

  act.append(like, rt);
  cont.appendChild(act);
  wrap.append(av, cont);

  addHoverTracking(wrap, p.id);
  return wrap;
}

function addHoverTracking(el, postId) {
  let timer;
  el.addEventListener("mouseenter", () => {
    timer = setTimeout(() =>
      window.parent.postMessage({ type: "USER_HOVER_POST", postId }, "*"),
    2000);
  });
  el.addEventListener("mouseleave", () => clearTimeout(timer));
}

document.getElementById("showMore").onclick = e => {
  if (appendedMore) return;
  appendedMore = true;
  shuffle(morePosts).forEach(p => convo.appendChild(createPost(p)));
  e.target.classList.add("fade-out");
  setTimeout(() => (e.target.style.display = "none"), 260);
  window.parent.postMessage({ type: "USER_SHOW_MORE_CLICKED" }, "*");
  sendHeight();
};

document.getElementById("postComment").onclick = () => {
  const ta = document.getElementById("userComment");
  const txt = ta.value.trim();
  if (!txt) return alert("Please write something before posting.");
  const newPost = {
    id: "u" + Date.now(),
    name: "You",
    handle: "@you",
    avatarSeed: "YOU",
    text: txt,
    likes: 0,
    retweets: 0
  };
  convo.appendChild(createPost(newPost));
  ta.value = "";
  window.parent.postMessage({ type: "USER_COMMENT", data: txt }, "*");
  sendHeight();
};

function sendHeight() {
  if (window.parent !== window) {
    window.parent.postMessage({ type: "IFRAME_HEIGHT", height: document.body.scrollHeight }, "*");
  }
}

renderInitial();
sendHeight();
new MutationObserver(sendHeight).observe(convo, { childList: true, subtree: true });
</script>
</body>
</html>
